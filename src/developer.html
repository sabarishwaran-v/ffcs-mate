<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer Timetable Parser - FFCS MATE</title>
    <link rel="icon" type="image/png" sizes="48x48" href="./images/icons/icon-48x48.png" />
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="./scss/main.scss" />
    <style>
        body { padding: 20px; font-family: 'Inter', sans-serif; }
        .parser-container { max-width: 1200px; margin: 0 auto; }
        textarea { width: 100%; height: 300px; font-family: monospace; font-size: 14px; padding: 15px; border-radius: 8px; border: 1px solid var(--bs-border-color); background-color: var(--bs-body-bg); color: var(--bs-body-color); resize: vertical; }
        pre { background: var(--bs-dark); color: var(--bs-light); padding: 15px; border-radius: 8px; height: 500px; overflow-y: auto; font-size: 13px; }
    </style>
</head>
<body>
    <div class="parser-container">
        <h2 class="mb-4 text-primary"><i class="fas fa-tools me-2"></i>FFCS MATE - VTOP Timetable Parser</h2>
        <p class="text-muted mb-4">Paste the raw timetable grid copied directly from VTOP (including headers like 'THEORY Start', etc.) and generate the clean JSON schema.</p>
        
        <div class="row gx-4">
            <div class="col-md-12 mb-4">
                <h5 class="mb-3">1. Paste VTOP Raw Text</h5>
                <textarea id="vtop-input" placeholder="Paste here..."></textarea>
                <div class="d-flex justify-content-between mt-3">
                    <button class="btn btn-outline-secondary" onclick="document.getElementById('vtop-input').value = ''">Clear</button>
                    <button class="btn btn-primary px-4" id="parse-btn"><i class="fas fa-magic me-2"></i>Generate Schema & Preview</button>
                </div>
            </div>
        </div>

        <div class="row gx-4 mt-2" id="output-section" style="display: none;">
            <div class="col-md-12 mb-4">
                <h5 class="mb-3"><i class="fas fa-eye me-2 text-primary"></i>2. Visual Preview <span class="fs-6 text-muted fw-normal ms-2">(Cross-check with VTOP)</span></h5>
                <div id="preview-container" class="border rounded p-2 bg-white">
                    <!-- Table rendered here -->
                </div>
            </div>
            
            <div class="col-md-12 mb-4">
                <h5 class="mb-3 d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-code me-2 text-primary"></i>3. Output Schema JSON</span>
                    <button class="btn btn-sm btn-outline-primary" id="copy-btn"><i class="fas fa-copy me-1"></i>Copy JSON</button>
                </h5>
                <pre><code id="json-output"></code></pre>
            </div>
        </div>
    </div>
    
    <script type="module" src="./js/parser.js"></script>
</body>
</html>
